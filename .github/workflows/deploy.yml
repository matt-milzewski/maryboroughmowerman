name: Deploy to S3

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Remove files that should never be public
        run: |
          aws s3 rm s3://maryboroughmowerman/.git --recursive || true
          aws s3 rm s3://maryboroughmowerman/.github --recursive || true
          aws s3 rm s3://maryboroughmowerman/.DS_Store || true
          aws s3 rm s3://maryboroughmowerman/images/.DS_Store || true
          aws s3 rm s3://maryboroughmowerman/.gitignore || true
          aws s3 rm s3://maryboroughmowerman/.htmlvalidate.json || true
          aws s3 rm s3://maryboroughmowerman/README.md || true
          aws s3 rm s3://maryboroughmowerman/aws-website-config.json || true

      - name: Sync files to S3
        run: |
          aws s3 sync ./ s3://maryboroughmowerman --delete --exact-timestamps \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".DS_Store" \
            --exclude "*/.DS_Store" \
            --exclude ".gitignore" \
            --exclude ".htmlvalidate.json" \
            --exclude "README.md" \
            --exclude "aws-website-config.json"

      - name: Apply S3 website configuration
        run: |
          aws s3api put-bucket-website --bucket maryboroughmowerman --website-configuration file://aws-website-config.json

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id E2H5EBMSGI9L7N --paths "/*"
